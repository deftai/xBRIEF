name: CI

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read
  pull-requests: read

jobs:
  pr-title:
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - name: Check PR title follows Conventional Commits
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Task
        uses: go-task/setup-task@v1

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: history/api/go/go.mod
          cache: true
          cache-dependency-path: history/api/go/go.sum

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: libxbrief-ts/package-lock.json

      - name: Install TypeScript dependencies
        run: npm ci
        working-directory: libxbrief-ts

      - name: Run checks (with coverage gate)
        run: task quality
